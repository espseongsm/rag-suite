name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  codecheck:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genai_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_TEST_URL: postgresql://postgres:postgres@localhost:5432/genai_platform_test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra postgres

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest -q

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: CLI smoke test
        run: uv run python main.py --help
