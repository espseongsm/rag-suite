name: genai-platform

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: genai_platform
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/data/schema.sql:/docker-entrypoint-initdb.d/01-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d genai_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  models:
    build:
      context: .
      dockerfile: docker/models.Dockerfile
    image: genai-platform/models:dev
    env_file:
      - path: ./.env
        required: false
    environment:
      LOCAL_EMBEDDING_URL: http://embedding-local:80
      LOCAL_EMBEDDING_MODELS: ${LOCAL_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}

  data:
    build:
      context: .
      dockerfile: docker/data.Dockerfile
    image: genai-platform/data:dev
    environment:
      VECTOR_STORE: ${VECTOR_STORE:-pgvector}
      DB_CONNECTION_STRING: postgresql://postgres@postgres/genai_platform
      GENAI_GATEWAY_URL: gateway:50051
      QDRANT_URL: http://qdrant:6333
      CHROMA_URL: http://chroma:8000
      MILVUS_URL: http://milvus:19530
      WEAVIATE_URL: http://weaviate:8080
      OPENSEARCH_URL: http://opensearch:9200
      AZURE_SEARCH_SERVICE_ENDPOINT: ${AZURE_SEARCH_SERVICE_ENDPOINT:-}
      AZURE_SEARCH_API_KEY: ${AZURE_SEARCH_API_KEY:-}
      AZURE_SEARCH_INDEX_PREFIX: ${AZURE_SEARCH_INDEX_PREFIX:-axe}
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    image: genai-platform/gateway:dev
    ports:
      - "50051:50051"
    environment:
      MODELS_SERVICE_ADDR: models:50053
      DATA_SERVICE_ADDR: data:50054
    depends_on:
      models:
        condition: service_healthy
      data:
        condition: service_healthy

  embedding-local:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    platform: linux/amd64
    profiles: ["local-embedding"]
    command:
      - "--model-id"
      - "${LOCAL_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - embedding_cache:/data
    ports:
      - "8081:80"

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["qdrant"]
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  chroma:
    image: chromadb/chroma:latest
    profiles: ["chroma"]
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    profiles: ["milvus"]
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - milvus_etcd:/etcd

  milvus-minio:
    image: minio/minio:latest
    profiles: ["milvus"]
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - milvus_minio:/minio_data
    ports:
      - "9001:9001"

  milvus:
    image: milvusdb/milvus:latest
    profiles: ["milvus"]
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:latest
    profiles: ["weaviate"]
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    ports:
      - "8082:8080"

  opensearch:
    image: opensearchproject/opensearch:2
    profiles: ["opensearch"]
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"

volumes:
  postgres_data:
  embedding_cache:
  qdrant_data:
  chroma_data:
  milvus_etcd:
  milvus_minio:
  milvus_data:
  weaviate_data:
  opensearch_data:
